<form role="search" aria-label="Filter properties" class="my-8 p-6 bg-white rounded-lg shadow-sm">
  <fieldset class="border-0 p-0 m-0">
    <legend class="sr-only">Property Search Filters</legend>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 items-end">

      <!-- Property Type Filter with Counts - Story UX Redesign -->
      <div>
        <div class="flex items-center gap-2 mb-2">
          <label for="filter-type" class="block text-sm font-medium text-gray-700">
            Property Type
          </label>
          <span class="inline-block bg-blue-100 text-blue-800 text-xs font-semibold px-2 py-1 rounded-full">
            {{ properties.length }}
          </span>
        </div>
        <select
          id="filter-type"
          name="propertyType"
          data-filter="type"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[48px]">
          <option value="">All Types ({{ properties.length }})</option>
          <option value="House">House ({{ properties | countByAttribute('propertyType', 'House') }})</option>
          <option value="FlatApartment">Flat/Apartment ({{ properties | countByAttribute('propertyType', 'FlatApartment') }})</option>
          <option value="Sectional Title Unit">Sectional Title Unit (0)</option>
          <option value="Land">Land (0)</option>
        </select>
      </div>

      <!-- Price Range Slider - Professional UX like OneRoof -->
      <div class="lg:col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Price Range
        </label>
        <div class="space-y-4">
          <!-- Range Inputs -->
          <div class="space-y-2">
            <div class="flex gap-3">
              <div class="flex-1">
                <label for="filter-price-min" class="text-xs text-gray-600 mb-1 block">Min Price</label>
                <input
                  type="range"
                  id="filter-price-min"
                  name="priceMin"
                  data-filter="price-min"
                  min="0"
                  max="10000000"
                  step="50000"
                  value="0"
                  class="price-slider w-full h-2 bg-gradient-to-r from-blue-200 to-blue-400 rounded-lg appearance-none cursor-pointer accent-blue-600"
                  aria-label="Minimum price">
              </div>
              <div class="flex-1">
                <label for="filter-price-max" class="text-xs text-gray-600 mb-1 block">Max Price</label>
                <input
                  type="range"
                  id="filter-price-max"
                  name="priceMax"
                  data-filter="price-max"
                  min="0"
                  max="10000000"
                  step="50000"
                  value="10000000"
                  class="price-slider w-full h-2 bg-gradient-to-r from-blue-200 to-blue-400 rounded-lg appearance-none cursor-pointer accent-blue-600"
                  aria-label="Maximum price">
              </div>
            </div>
          </div>

          <!-- Price Display -->
          <div class="bg-blue-50 rounded-lg p-3 border border-blue-200 flex justify-between items-center">
            <div>
              <p class="text-xs text-gray-600">From</p>
              <p class="text-lg font-bold text-blue-600" id="price-min-display">R0</p>
            </div>
            <div class="text-gray-400">to</div>
            <div class="text-right">
              <p class="text-xs text-gray-600">To</p>
              <p class="text-lg font-bold text-blue-600" id="price-max-display">R10M+</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Bedrooms Filter with Counts -->
      <div>
        <div class="flex items-center gap-2 mb-2">
          <label for="filter-bedrooms" class="block text-sm font-medium text-gray-700">
            Bedrooms
          </label>
          <span class="inline-block bg-blue-100 text-blue-800 text-xs font-semibold px-2 py-1 rounded-full">
            {{ properties.length }}
          </span>
        </div>
        <select
          id="filter-bedrooms"
          name="bedrooms"
          data-filter="bedrooms"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[48px]">
          <option value="">Any</option>
          <option value="1">1+ (0)</option>
          <option value="2">2+ (0)</option>
          <option value="3">3+ (0)</option>
          <option value="4">4+ (0)</option>
          <option value="5">5+ (0)</option>
        </select>
      </div>

      <!-- Location Filter with Counts -->
      <div>
        <div class="flex items-center gap-2 mb-2">
          <label for="filter-location" class="block text-sm font-medium text-gray-700">
            Location
          </label>
          <span class="inline-block bg-blue-100 text-blue-800 text-xs font-semibold px-2 py-1 rounded-full">
            {{ properties.length }}
          </span>
        </div>
        <select
          id="filter-location"
          name="location"
          data-filter="location"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[48px]">
          <option value="">All Locations ({{ properties.length }})</option>
          {%- for location in ['Florida Park', 'Glenhazel', 'Moregloed', 'Ninapark'] %}
            <option value="{{ location }}">{{ location }} ({{ properties | countByAttribute('location', location) }})</option>
          {%- endfor %}
        </select>
      </div>

      <!-- Clear All Filters Button -->
      <div>
        <button
          type="button"
          data-filter-action="clear"
          class="w-full px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[48px] transition-colors">
          Clear Filters
        </button>
      </div>

    </div>
  </fieldset>
</form>

<!-- Price Range Slider Styling -->
<style>
  /* Custom range slider styling */
  .price-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 8px;
    background: linear-gradient(to right, #bfdbfe, #60a5fa);
    border-radius: 8px;
    outline: none;
    cursor: pointer;
  }

  /* Slider thumb (the draggable part) */
  .price-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
    border: 2px solid white;
    transition: all 0.2s ease;
  }

  .price-slider::-webkit-slider-thumb:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.5);
  }

  .price-slider::-webkit-slider-thumb:active {
    transform: scale(0.95);
  }

  /* Firefox thumb */
  .price-slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
    border: 2px solid white;
    transition: all 0.2s ease;
  }

  .price-slider::-moz-range-thumb:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.5);
  }

  /* Firefox track */
  .price-slider::-moz-range-track {
    background: transparent;
    border: none;
  }
</style>

<!-- Price Range Slider Display Update -->
<script>
  const priceMinInput = document.getElementById('filter-price-min');
  const priceMaxInput = document.getElementById('filter-price-max');
  const priceMinDisplay = document.getElementById('price-min-display');
  const priceMaxDisplay = document.getElementById('price-max-display');

  function formatPrice(value) {
    const num = parseInt(value);
    if (num >= 1000000) {
      return 'R' + (num / 1000000).toFixed(1) + 'M';
    } else if (num >= 1000) {
      return 'R' + (num / 1000).toFixed(0) + 'K';
    }
    return 'R' + num;
  }

  function updatePriceDisplay() {
    priceMinDisplay.textContent = formatPrice(priceMinInput.value);
    priceMaxDisplay.textContent = formatPrice(priceMaxInput.value);
  }

  priceMinInput.addEventListener('input', updatePriceDisplay);
  priceMaxInput.addEventListener('input', updatePriceDisplay);
  updatePriceDisplay();
</script>
