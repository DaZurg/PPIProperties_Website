<!-- OneRoof-style Filter Bar - Horizontal dropdown buttons -->
<div class="filter-bar-oneroof">
  <div class="filter-bar-row">
    <!-- Location Button (opens modal) -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn" id="location-filter-btn">
        <span class="filter-btn-label" id="location-btn-label">{{ siteConfig.location.countryLabel }}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
    </div>
    <!-- Hidden input for filtering.js -->
    <input type="hidden" id="location-filter-value" data-filter="location" value="">

    <!-- Price Dropdown with Histogram Slider -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn" data-dropdown="price" id="price-filter-btn">
        <span class="filter-btn-label" id="price-btn-label">Price</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="filter-dropdown-menu filter-dropdown-price" id="dropdown-price">
        <div class="filter-dropdown-header">Price</div>

        <!-- Histogram Container -->
        <div class="price-histogram" id="price-histogram">
          <!-- Bars will be generated by JavaScript -->
        </div>

        <!-- Dual Range Slider -->
        <div class="price-slider-container">
          <div class="price-slider-track" id="price-slider-track"></div>
          <div class="price-slider-range" id="price-slider-range"></div>
          <input type="range" class="price-slider-input" id="price-slider-min"
                 min="0" max="5000000" step="100000" value="0"
                 data-filter="price-min">
          <input type="range" class="price-slider-input" id="price-slider-max"
                 min="0" max="5000000" step="100000" value="5000000"
                 data-filter="price-max">
        </div>

        <!-- Price Labels -->
        <div class="price-slider-labels">
          <span class="price-label-min" id="price-label-min">{{ siteConfig.currency.symbol }}0</span>
          <span class="price-label-max" id="price-label-max">{{ siteConfig.currency.symbol }}5,000,000+</span>
        </div>

        <!-- Action Buttons -->
        <div class="price-slider-actions">
          <button type="button" class="price-slider-clear" id="price-slider-clear">Clear</button>
          <button type="button" class="price-slider-apply" id="price-slider-apply">
            <span id="price-slider-count">Show all properties</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Beds Dropdown -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn" data-dropdown="beds">
        <span class="filter-btn-label">Beds</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="filter-dropdown-menu" id="dropdown-beds">
        <div class="filter-dropdown-header">Bedrooms</div>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="" checked data-filter="bedrooms"> Any <span class="filter-count" data-count="beds-any"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="1" data-filter="bedrooms"> 1+ <span class="filter-count" data-count="beds-1"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="2" data-filter="bedrooms"> 2+ <span class="filter-count" data-count="beds-2"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="3" data-filter="bedrooms"> 3+ <span class="filter-count" data-count="beds-3"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="4" data-filter="bedrooms"> 4+ <span class="filter-count" data-count="beds-4"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="5" data-filter="bedrooms"> 5+ <span class="filter-count" data-count="beds-5"></span>
        </label>
      </div>
    </div>

    <!-- Baths Dropdown -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn" data-dropdown="baths">
        <span class="filter-btn-label">Baths</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="filter-dropdown-menu" id="dropdown-baths">
        <div class="filter-dropdown-header">Bathrooms</div>
        <label class="filter-option">
          <input type="radio" name="bathrooms" value="" checked data-filter="bathrooms"> Any <span class="filter-count" data-count="baths-any"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="bathrooms" value="1" data-filter="bathrooms"> 1+ <span class="filter-count" data-count="baths-1"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="bathrooms" value="2" data-filter="bathrooms"> 2+ <span class="filter-count" data-count="baths-2"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="bathrooms" value="3" data-filter="bathrooms"> 3+ <span class="filter-count" data-count="baths-3"></span>
        </label>
      </div>
    </div>

    <!-- Property Type Dropdown -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn" data-dropdown="type">
        <span class="filter-btn-label">Property types</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="filter-dropdown-menu" id="dropdown-type">
        <div class="filter-dropdown-header">Property Type</div>
        <label class="filter-option">
          <input type="radio" name="propertyType" value="" checked data-filter="type"> All Types <span class="filter-count" data-count="type-any"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="propertyType" value="House" data-filter="type"> House <span class="filter-count" data-count="type-House"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="propertyType" value="FlatApartment" data-filter="type"> Flat/Apartment <span class="filter-count" data-count="type-FlatApartment"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="propertyType" value="Townhouse" data-filter="type"> Townhouse <span class="filter-count" data-count="type-Townhouse"></span>
        </label>
        <label class="filter-option">
          <input type="radio" name="propertyType" value="Land" data-filter="type"> Land <span class="filter-count" data-count="type-Land"></span>
        </label>
      </div>
    </div>

    <!-- More Filters Dropdown -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn filter-btn-more" data-dropdown="more" id="more-filter-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="21" x2="4" y2="14"></line>
          <line x1="4" y1="10" x2="4" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12" y2="3"></line>
          <line x1="20" y1="21" x2="20" y2="16"></line>
          <line x1="20" y1="12" x2="20" y2="3"></line>
          <line x1="1" y1="14" x2="7" y2="14"></line>
          <line x1="9" y1="8" x2="15" y2="8"></line>
          <line x1="17" y1="16" x2="23" y2="16"></line>
        </svg>
        <span class="filter-btn-label" id="more-btn-label">More filters</span>
      </button>
      <div class="filter-dropdown-menu filter-dropdown-wide" id="dropdown-more">
        <div class="filter-dropdown-header">Green & Energy Features</div>
        <label class="filter-option filter-checkbox">
          <input type="checkbox" name="highlight-solar" value="solarPanels" data-filter="highlight">
          <span class="filter-checkbox-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </span>
          Solar Panels
        </label>
        <label class="filter-option filter-checkbox">
          <input type="checkbox" name="highlight-solar-geyser" value="solarGeyser" data-filter="highlight">
          <span class="filter-checkbox-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v18M3 12h18"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
          Solar Geyser
        </label>
        <label class="filter-option filter-checkbox">
          <input type="checkbox" name="highlight-gas-geyser" value="gasGeyser" data-filter="highlight">
          <span class="filter-checkbox-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2c1 3 3 5 3 9a3 3 0 11-6 0c0-4 2-6 3-9z"/><path d="M12 22v-3"/></svg>
          </span>
          Gas Geyser
        </label>
        <label class="filter-option filter-checkbox">
          <input type="checkbox" name="highlight-battery" value="backupBattery" data-filter="highlight">
          <span class="filter-checkbox-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="18" height="10" rx="2"/><path d="M22 11v2"/><path d="M6 11v2M10 11v2M14 11v2"/></svg>
          </span>
          Backup Battery
        </label>
        <label class="filter-option filter-checkbox">
          <input type="checkbox" name="highlight-borehole" value="borehole" data-filter="highlight">
          <span class="filter-checkbox-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v8M8 6h8M12 10v12"/><circle cx="12" cy="18" r="3"/></svg>
          </span>
          Borehole
        </label>
        <label class="filter-option filter-checkbox">
          <input type="checkbox" name="highlight-water-tank" value="waterTank" data-filter="highlight">
          <span class="filter-checkbox-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2h12l2 6v12a2 2 0 01-2 2H6a2 2 0 01-2-2V8l2-6z"/><path d="M4 8h16"/></svg>
          </span>
          Water Tank
        </label>

        <div class="filter-dropdown-header" style="margin-top: 12px;">Other Features</div>
        <label class="filter-option filter-checkbox">
          <input type="checkbox" name="highlight-pets" value="petsAllowed" data-filter="highlight">
          <span class="filter-checkbox-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-2.823.47-4.113 6.006-4 7 .137 1.217 1.217 2.5 3 2.5 2.242 0 4.5-1.5 4.5-3.328z"/><path d="M14.267 5.172c0-1.39 1.577-2.493 3.5-2.172 2.823.47 4.113 6.006 4 7-.137 1.217-1.217 2.5-3 2.5-2.242 0-4.5-1.5-4.5-3.328z"/><path d="M8 14v.5"/><path d="M16 14v.5"/><path d="M11.25 16.25h1.5L12 17l-.75-.75z"/><path d="M4.42 11.247a13.152 13.152 0 004.08 5.253c1.33 1.11 3.165 3.11 3.5 5.5.336-2.39 2.171-4.39 3.5-5.5a13.152 13.152 0 004.08-5.253"/></svg>
          </span>
          Pets Allowed
        </label>

        <!-- Clear & Apply buttons -->
        <div class="more-filter-actions">
          <button type="button" class="more-filter-clear" id="more-filter-clear">Clear</button>
          <button type="button" class="more-filter-apply" id="more-filter-apply">Apply Filters</button>
        </div>
      </div>
    </div>

    <!-- Clear All Filters Button - Always visible, highlighted when active -->
    <button type="button" class="filter-btn filter-btn-clear-all" id="clear-all-filters-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
      <span>Clear all</span>
    </button>
  </div>
</div>

<!-- Location Selector Modal -->
<div class="location-modal" id="location-modal">
  <div class="location-modal-content">
    <!-- Header -->
    <div class="location-modal-header">
      <button type="button" class="location-modal-back" id="location-back-btn" style="visibility: hidden;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <h2 class="location-modal-title" id="location-modal-title">Select a region</h2>
      <button type="button" class="location-modal-close" id="location-close-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Location List -->
    <div class="location-modal-body" id="location-list">
      <!-- Populated by JavaScript -->
    </div>

    <!-- Footer -->
    <div class="location-modal-footer">
      <button type="button" class="location-modal-clear" id="location-clear-btn">Clear</button>
      <button type="button" class="location-modal-apply" id="location-apply-btn">
        <span id="location-apply-text">Refine search</span>
      </button>
    </div>
  </div>
</div>

<style>
/* OneRoof Filter Bar Styles */
.filter-bar-oneroof {
  background: #f9fafb;
  border-bottom: 1px solid #e5e7eb;
  padding: 12px 0;
  margin-bottom: 0;
}

.filter-bar-row {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1rem;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.filter-dropdown {
  position: relative;
}

.filter-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  color: #374151;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.filter-btn:hover {
  border-color: #9ca3af;
  background: #fafafa;
}

.filter-btn.active {
  border-color: #f97316;
  background: #fff7ed;
  color: #ea580c;
}

.filter-btn-more {
  margin-left: auto;
}

.filter-btn-more.active {
  border-color: #f97316;
  background: #fff7ed;
  color: #ea580c;
}

.filter-btn-clear-all {
  margin-left: auto;
  background: white;
  border-color: #e5e7eb;
  color: #9ca3af;
}

.filter-btn-clear-all:hover {
  background: #f9fafb;
  border-color: #d1d5db;
  color: #6b7280;
}

.filter-btn-clear-all.has-filters {
  background: #fee2e2;
  border-color: #fecaca;
  color: #dc2626;
}

.filter-btn-clear-all.has-filters:hover {
  background: #fecaca;
  border-color: #fca5a5;
}

.filter-dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.12);
  min-width: 180px;
  z-index: 50;
  padding: 8px 0;
}

.filter-dropdown-menu.show {
  display: block;
}

.filter-dropdown-wide {
  min-width: 280px;
  padding: 12px 0;
}

/* Checkbox style filters */
.filter-checkbox {
  display: flex;
  align-items: center;
  gap: 10px;
}

.filter-checkbox input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #f97316;
  cursor: pointer;
}

.filter-checkbox-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  color: #6b7280;
}

.filter-checkbox:has(input:checked) .filter-checkbox-icon {
  color: #22c55e;
}

/* More filter action buttons */
.more-filter-actions {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid #e5e7eb;
  margin-top: 8px;
}

.more-filter-clear {
  flex: 0 0 auto;
  padding: 8px 16px;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: #374151;
  cursor: pointer;
  transition: all 0.15s;
}

.more-filter-clear:hover {
  background: #f9fafb;
  border-color: #d1d5db;
}

.more-filter-apply {
  flex: 1;
  padding: 8px 16px;
  background: #f97316;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  transition: all 0.15s;
}

.more-filter-apply:hover {
  background: #ea580c;
}

.filter-dropdown-header {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 600;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid #f3f4f6;
  margin-bottom: 4px;
}

.filter-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 14px;
  color: #374151;
}

.filter-option:hover {
  background: #f9fafb;
}

.filter-option input[type="radio"] {
  width: 16px;
  height: 16px;
  accent-color: #f97316;
}

.filter-count {
  margin-left: auto;
  font-size: 12px;
  color: #9ca3af;
  font-weight: 400;
}

.filter-count:empty {
  display: none;
}

/* Price Histogram Slider Styles */
.filter-dropdown-price {
  min-width: 320px;
  padding: 16px;
}

.price-histogram {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  height: 60px;
  margin-bottom: 8px;
  padding: 0 4px;
  gap: 2px;
}

.price-histogram-bar {
  flex: 1;
  background: #f97316;
  border-radius: 2px 2px 0 0;
  min-height: 4px;
  transition: background 0.2s, opacity 0.2s;
}

.price-histogram-bar.inactive {
  background: #e5e7eb;
}

.price-slider-container {
  position: relative;
  height: 24px;
  margin: 8px 0;
}

.price-slider-track {
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 4px;
  background: #e5e7eb;
  border-radius: 2px;
  transform: translateY(-50%);
}

.price-slider-range {
  position: absolute;
  top: 50%;
  height: 4px;
  background: #f97316;
  border-radius: 2px;
  transform: translateY(-50%);
}

.price-slider-input {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  pointer-events: none;
  margin: 0;
}

.price-slider-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;
  height: 20px;
  background: white;
  border: 2px solid #f97316;
  border-radius: 50%;
  cursor: pointer;
  pointer-events: all;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  transition: transform 0.15s;
}

.price-slider-input::-webkit-slider-thumb:hover {
  transform: scale(1.1);
}

.price-slider-input::-moz-range-thumb {
  width: 20px;
  height: 20px;
  background: white;
  border: 2px solid #f97316;
  border-radius: 50%;
  cursor: pointer;
  pointer-events: all;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.price-slider-labels {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: #f97316;
  font-weight: 600;
  margin-bottom: 16px;
}

.price-slider-actions {
  display: flex;
  gap: 8px;
}

.price-slider-clear {
  flex: 0 0 auto;
  padding: 10px 20px;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  color: #374151;
  cursor: pointer;
  transition: all 0.15s;
}

.price-slider-clear:hover {
  background: #f9fafb;
  border-color: #d1d5db;
}

.price-slider-apply {
  flex: 1;
  padding: 10px 20px;
  background: #f97316;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  transition: all 0.15s;
}

.price-slider-apply:hover {
  background: #ea580c;
}

/* Location Modal Styles */
.location-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.location-modal.active {
  display: flex;
}

.location-modal-content {
  background: white;
  border-radius: 12px;
  width: 100%;
  max-width: 500px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
}

.location-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid #e5e7eb;
}

.location-modal-back,
.location-modal-close {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  cursor: pointer;
  color: #374151;
  border-radius: 8px;
  transition: background 0.15s;
}

.location-modal-back:hover,
.location-modal-close:hover {
  background: #f3f4f6;
}

.location-modal-title {

<script>
// Site configuration (injected from _data/siteConfig.json)
const SITE_CONFIG = {{ siteConfig | dump | safe }};

// Filter dropdown functionality with Price Histogram Slider and Location Modal
document.addEventListener('DOMContentLoaded', function() {

  // ==================== LOCATION MODAL ====================
  // Location hierarchy data
  const locationData = {{ locations | dump | safe }};

  // State
  let selectedLocations = []; // Array of suburb names
  let currentLevel = 'province'; // 'province', 'city', 'suburb'
  let currentProvince = null;
  let currentCity = null;

  // Elements
  const locationBtn = document.getElementById('location-filter-btn');
  const locationBtnLabel = document.getElementById('location-btn-label');
  const locationModal = document.getElementById('location-modal');
  const locationList = document.getElementById('location-list');
  const locationTitle = document.getElementById('location-modal-title');
  const locationBackBtn = document.getElementById('location-back-btn');
  const locationCloseBtn = document.getElementById('location-close-btn');
  const locationClearBtn = document.getElementById('location-clear-btn');
  const locationApplyBtn = document.getElementById('location-apply-btn');
  const locationApplyText = document.getElementById('location-apply-text');
  const locationFilterValue = document.getElementById('location-filter-value');

  // Count properties in a location (suburb)
  function countPropertiesInSuburb(suburb) {
    if (typeof allProperties === 'undefined') return 0;
    return allProperties.filter(p => p.location === suburb).length;
  }

  // Count properties in a city (sum of all suburbs)
  function countPropertiesInCity(city) {
    if (typeof allProperties === 'undefined') return 0;
    let count = 0;
    city.suburbs.forEach(suburb => {
      count += countPropertiesInSuburb(suburb);
    });
    return count;
  }

  // Count properties in a province (sum of all cities)
  function countPropertiesInProvince(province) {
    if (typeof allProperties === 'undefined') return 0;
    let count = 0;
    province.cities.forEach(city => {
      count += countPropertiesInCity(city);
    });
    return count;
  }

  // Check if all suburbs in a city are selected
  function isCitySelected(city) {
    return city.suburbs.every(suburb => selectedLocations.includes(suburb));
  }

  // Check if any suburb in a city is selected
  function isCityPartiallySelected(city) {
    return city.suburbs.some(suburb => selectedLocations.includes(suburb));
  }

  // Check if all cities in a province are selected
  function isProvinceSelected(province) {
    return province.cities.every(city => isCitySelected(city));
  }

  // Check if any city in a province has selections
  function isProvincePartiallySelected(province) {
    return province.cities.some(city => isCityPartiallySelected(city));
  }

  // Render province list
  function renderProvinces() {
    currentLevel = 'province';
    currentProvince = null;
    currentCity = null;
    locationTitle.textContent = 'Select a region';
    locationBackBtn.style.visibility = 'hidden';

    let html = '';

    // Select All option
    const allSelected = locationData.provinces.every(p => isProvinceSelected(p));
    html += `
      <div class="location-item ${allSelected ? 'selected' : ''}" data-action="select-all">
        <button type="button" class="location-item-checkbox-btn" data-action="select-all" aria-label="Select all regions"></button>
        <div class="location-item-content">
          <span class="location-item-name">Select All</span>
        </div>
      </div>
    `;

    // Province items
    locationData.provinces.forEach(province => {
      const count = countPropertiesInProvince(province);
      const selected = isProvinceSelected(province);
      const partial = !selected && isProvincePartiallySelected(province);

      html += `
        <div class="location-item ${selected ? 'selected' : ''}" data-province="${province.slug}">
          <button type="button" class="location-item-checkbox-btn ${partial ? 'partial' : ''}"
                  data-action="select-province" data-province="${province.slug}"
                  aria-label="Select all in ${province.name}"></button>
          <button type="button" class="location-item-content location-item-drill" data-action="drill" data-province="${province.slug}">
            <span class="location-item-name">${province.name}</span>
            <div class="location-item-right">
              <span class="location-item-count">${count}</span>
              <svg class="location-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </div>
          </button>
        </div>
      `;
    });

    locationList.innerHTML = html;
    attachListItemHandlers();
  }

  // Render city list for a province
  function renderCities(province) {
    currentLevel = 'city';
    currentProvince = province;
    currentCity = null;
    locationTitle.textContent = province.name;
    locationBackBtn.style.visibility = 'visible';

    let html = '';

    // Select All option for this province
    const allSelected = isProvinceSelected(province);
    html += `
      <div class="location-item ${allSelected ? 'selected' : ''}" data-action="select-all-province">
        <button type="button" class="location-item-checkbox-btn" data-action="select-all-province" aria-label="Select all in ${province.name}"></button>
        <div class="location-item-content">
          <span class="location-item-name">Select All</span>
        </div>
      </div>
    `;

    // City items
    province.cities.forEach(city => {
      const count = countPropertiesInCity(city);
      const selected = isCitySelected(city);
      const partial = !selected && isCityPartiallySelected(city);

      html += `
        <div class="location-item ${selected ? 'selected' : ''}" data-city="${city.slug}">
          <button type="button" class="location-item-checkbox-btn ${partial ? 'partial' : ''}"
                  data-action="select-city" data-city="${city.slug}"
                  aria-label="Select all in ${city.name}"></button>
          <button type="button" class="location-item-content location-item-drill" data-action="drill" data-city="${city.slug}">
            <span class="location-item-name">${city.name}</span>
            <div class="location-item-right">
              <span class="location-item-count">${count}</span>
              <svg class="location-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </div>
          </button>
        </div>
      `;
    });

    locationList.innerHTML = html;
    attachListItemHandlers();
  }

  // Render suburb list for a city
  function renderSuburbs(city) {
    currentLevel = 'suburb';
    currentCity = city;
    locationTitle.textContent = city.name;
    locationBackBtn.style.visibility = 'visible';

    let html = '';

    // Select All option for this city
    const allSelected = isCitySelected(city);
    html += `
      <div class="location-item ${allSelected ? 'selected' : ''}" data-action="select-all-city">
        <button type="button" class="location-item-checkbox-btn" data-action="select-all-city" aria-label="Select all in ${city.name}"></button>
        <div class="location-item-content">
          <span class="location-item-name">Select All</span>
        </div>
      </div>
    `;

    // Suburb items
    city.suburbs.forEach(suburb => {
      const count = countPropertiesInSuburb(suburb);
      const selected = selectedLocations.includes(suburb);

      html += `
        <div class="location-item ${selected ? 'selected' : ''}" data-suburb="${suburb}">
          <button type="button" class="location-item-checkbox-btn" data-action="toggle" data-suburb="${suburb}" aria-label="Select ${suburb}"></button>
          <div class="location-item-content">
            <span class="location-item-name">${suburb}</span>
            <div class="location-item-right">
              <span class="location-item-count">${count}</span>
            </div>
          </div>
        </div>
      `;
    });

    locationList.innerHTML = html;
    attachListItemHandlers();
  }

  // Attach event handlers to list items
  function attachListItemHandlers() {
    // Handle checkbox button clicks
    locationList.querySelectorAll('.location-item-checkbox-btn').forEach(btn => {
      btn.addEventListener('click', handleCheckboxClick);
    });
    // Handle drill-down clicks
    locationList.querySelectorAll('.location-item-drill').forEach(btn => {
      btn.addEventListener('click', handleDrillClick);
    });
    updateApplyButton();
  }

  // Handle checkbox clicks (select without drilling down)
  function handleCheckboxClick(e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    const action = btn.dataset.action;
    const item = btn.closest('.location-item');

    if (action === 'select-all') {
      // Toggle select all provinces
      const allSelected = locationData.provinces.every(p => isProvinceSelected(p));
      if (allSelected) {
        selectedLocations = [];
      } else {
        selectedLocations = [];
        locationData.provinces.forEach(p => {
          p.cities.forEach(c => {
            c.suburbs.forEach(s => {
              if (!selectedLocations.includes(s)) selectedLocations.push(s);
            });
          });
        });
      }
      renderProvinces();
    } else if (action === 'select-all-province' && currentProvince) {
      // Toggle select all cities in current province
      if (isProvinceSelected(currentProvince)) {
        currentProvince.cities.forEach(city => {
          city.suburbs.forEach(suburb => {
            const idx = selectedLocations.indexOf(suburb);
            if (idx > -1) selectedLocations.splice(idx, 1);
          });
        });
      } else {
        currentProvince.cities.forEach(city => {
          city.suburbs.forEach(suburb => {
            if (!selectedLocations.includes(suburb)) selectedLocations.push(suburb);
          });
        });
      }
      renderCities(currentProvince);
    } else if (action === 'select-all-city' && currentCity) {
      // Toggle select all suburbs in current city
      if (isCitySelected(currentCity)) {
        currentCity.suburbs.forEach(suburb => {
          const idx = selectedLocations.indexOf(suburb);
          if (idx > -1) selectedLocations.splice(idx, 1);
        });
      } else {
        currentCity.suburbs.forEach(suburb => {
          if (!selectedLocations.includes(suburb)) selectedLocations.push(suburb);
        });
      }
      renderSuburbs(currentCity);
    } else if (action === 'select-province') {
      // Toggle all suburbs in this province
      const provinceSlug = btn.dataset.province;
      const province = locationData.provinces.find(p => p.slug === provinceSlug);
      if (province) {
        if (isProvinceSelected(province)) {
          // Deselect all suburbs in this province
          province.cities.forEach(city => {
            city.suburbs.forEach(suburb => {
              const idx = selectedLocations.indexOf(suburb);
              if (idx > -1) selectedLocations.splice(idx, 1);
            });
          });
        } else {
          // Select all suburbs in this province
          province.cities.forEach(city => {
            city.suburbs.forEach(suburb => {
              if (!selectedLocations.includes(suburb)) selectedLocations.push(suburb);
            });
          });
        }
        renderProvinces();
      }
    } else if (action === 'select-city') {
      // Toggle all suburbs in this city
      const citySlug = btn.dataset.city;
      const city = currentProvince.cities.find(c => c.slug === citySlug);
      if (city) {
        if (isCitySelected(city)) {
          city.suburbs.forEach(suburb => {
            const idx = selectedLocations.indexOf(suburb);
            if (idx > -1) selectedLocations.splice(idx, 1);
          });
        } else {
          city.suburbs.forEach(suburb => {
            if (!selectedLocations.includes(suburb)) selectedLocations.push(suburb);
          });
        }
        renderCities(currentProvince);
      }
    } else if (action === 'toggle') {
      // Toggle suburb selection
      const suburb = btn.dataset.suburb;
      const idx = selectedLocations.indexOf(suburb);
      if (idx > -1) {
        selectedLocations.splice(idx, 1);
      } else {
        selectedLocations.push(suburb);
      }
      item.classList.toggle('selected');
      updateApplyButton();
    }
  }

  // Handle drill-down clicks (navigate to next level)
  function handleDrillClick(e) {
    e.stopPropagation();
    const btn = e.currentTarget;

    if (currentLevel === 'province') {
      const provinceSlug = btn.dataset.province;
      const province = locationData.provinces.find(p => p.slug === provinceSlug);
      if (province) renderCities(province);
    } else if (currentLevel === 'city' && currentProvince) {
      const citySlug = btn.dataset.city;
      const city = currentProvince.cities.find(c => c.slug === citySlug);
      if (city) renderSuburbs(city);
    }
  }

  // Update apply button text
  function updateApplyButton() {
    if (typeof allProperties === 'undefined') return;

    let count;
    if (selectedLocations.length === 0) {
      count = allProperties.length;
      locationApplyText.textContent = 'Show all properties';
    } else {
      count = allProperties.filter(p => selectedLocations.includes(p.location)).length;
      locationApplyText.textContent = `Show ${count} ${count === 1 ? 'property' : 'properties'}`;
    }
  }

  // Open modal
  function openLocationModal() {
    locationModal.classList.add('active');
    document.body.style.overflow = 'hidden';
    renderProvinces();
  }

  // Close modal
  function closeLocationModal() {
    locationModal.classList.remove('active');
    document.body.style.overflow = '';
  }

  // Apply filter
  function applyLocationFilter() {
    // Update hidden input value
    locationFilterValue.value = selectedLocations.join(',');

    // Update button label
    if (selectedLocations.length === 0) {
      locationBtnLabel.textContent = SITE_CONFIG.location.countryLabel;
      locationBtn.classList.remove('active');
    } else if (selectedLocations.length === 1) {
      locationBtnLabel.textContent = selectedLocations[0];
      locationBtn.classList.add('active');
    } else {
      locationBtnLabel.textContent = `${selectedLocations.length} areas`;
      locationBtn.classList.add('active');
    }

    // Trigger filtering
    applyFilters();
    closeLocationModal();
  }

  // Clear selections
  function clearLocationFilter() {
    selectedLocations = [];
    if (currentLevel === 'province') {
      renderProvinces();
    } else if (currentLevel === 'city' && currentProvince) {
      renderCities(currentProvince);
    } else if (currentLevel === 'suburb' && currentCity) {
      renderSuburbs(currentCity);
    }
  }

  // Back button
  function goBack() {
    if (currentLevel === 'suburb' && currentProvince) {
      renderCities(currentProvince);
    } else if (currentLevel === 'city') {
      renderProvinces();
    }
  }

  // Event listeners
  if (locationBtn) locationBtn.addEventListener('click', openLocationModal);
  if (locationCloseBtn) locationCloseBtn.addEventListener('click', closeLocationModal);
  if (locationApplyBtn) locationApplyBtn.addEventListener('click', applyLocationFilter);
  if (locationClearBtn) locationClearBtn.addEventListener('click', clearLocationFilter);
  if (locationBackBtn) locationBackBtn.addEventListener('click', goBack);

  // Close on backdrop click
  if (locationModal) {
    locationModal.addEventListener('click', function(e) {
      if (e.target === locationModal) closeLocationModal();
    });
  }

  // ==================== PRICE SLIDER ====================
  // Price slider configuration
  const PRICE_MIN = 0;
  // Calculate PRICE_MAX dynamically from property data
  const PRICE_MAX = (function() {
    if (typeof allProperties !== 'undefined' && allProperties.length > 0) {
      const maxPrice = Math.max(...allProperties.map(p => p.price || 0));
      // Round up to nearest million
      return Math.ceil(maxPrice / 1000000) * 1000000;
    }
    return SITE_CONFIG.pricing.fallbackMax; // Default fallback from config
  })();
  // Expose for filtering.js
  window.PRICE_MAX = PRICE_MAX;
  const NUM_BUCKETS = 20;
  const BUCKET_SIZE = PRICE_MAX / NUM_BUCKETS;

  // Elements
  const priceSliderMin = document.getElementById('price-slider-min');
  const priceSliderMax = document.getElementById('price-slider-max');
  const priceSliderRange = document.getElementById('price-slider-range');
  const priceLabelMin = document.getElementById('price-label-min');
  const priceLabelMax = document.getElementById('price-label-max');
  const priceHistogram = document.getElementById('price-histogram');
  const priceSliderCount = document.getElementById('price-slider-count');
  const priceSliderClear = document.getElementById('price-slider-clear');
  const priceSliderApply = document.getElementById('price-slider-apply');
  const priceBtnLabel = document.getElementById('price-btn-label');
  const priceFilterBtn = document.getElementById('price-filter-btn');

  // Calculate price buckets from properties data
  function calculatePriceBuckets() {
    if (typeof allProperties === 'undefined') return [];

    const buckets = new Array(NUM_BUCKETS).fill(0);
    let maxCount = 0;

    allProperties.forEach(prop => {
      if (prop.price && prop.price > 0) {
        const bucketIndex = Math.min(Math.floor(prop.price / BUCKET_SIZE), NUM_BUCKETS - 1);
        buckets[bucketIndex]++;
        maxCount = Math.max(maxCount, buckets[bucketIndex]);
      }
    });

    return { buckets, maxCount };
  }

  // Render histogram bars
  function renderHistogram() {
    if (!priceHistogram) return;

    const { buckets, maxCount } = calculatePriceBuckets();
    priceHistogram.innerHTML = '';

    buckets.forEach((count, index) => {
      const bar = document.createElement('div');
      bar.className = 'price-histogram-bar';
      bar.dataset.bucket = index;

      // Calculate height as percentage of max (minimum 4px)
      const heightPercent = maxCount > 0 ? (count / maxCount) * 100 : 0;
      bar.style.height = Math.max(heightPercent, 7) + '%';

      priceHistogram.appendChild(bar);
    });

    updateHistogramHighlight();
  }

  // Update histogram bar highlighting based on slider values
  function updateHistogramHighlight() {
    if (!priceHistogram) return;

    const minVal = parseInt(priceSliderMin.value);
    const maxVal = parseInt(priceSliderMax.value);

    const bars = priceHistogram.querySelectorAll('.price-histogram-bar');
    bars.forEach((bar, index) => {
      const bucketMin = index * BUCKET_SIZE;
      const bucketMax = (index + 1) * BUCKET_SIZE;

      // Bucket is active if it overlaps with the selected range
      const isActive = bucketMin < maxVal && bucketMax > minVal;
      bar.classList.toggle('inactive', !isActive);
    });
  }

  // Format price for display
  function formatPrice(value) {
    const symbol = SITE_CONFIG.currency.symbol;
    if (value >= 1000000) {
      return symbol + (value / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
    }
    return symbol + value.toLocaleString('en-ZA');
  }

  // Update slider inputs to use dynamic PRICE_MAX (must be after formatPrice is defined)
  if (priceSliderMin) {
    priceSliderMin.max = PRICE_MAX;
  }
  if (priceSliderMax) {
    priceSliderMax.max = PRICE_MAX;
    priceSliderMax.value = PRICE_MAX;
  }
  if (priceLabelMax) {
    priceLabelMax.textContent = formatPrice(PRICE_MAX) + '+';
  }

  // Update slider range visual
  function updateSliderRange() {
    if (!priceSliderRange || !priceSliderMin || !priceSliderMax) return;

    const minVal = parseInt(priceSliderMin.value);
    const maxVal = parseInt(priceSliderMax.value);
    const range = PRICE_MAX - PRICE_MIN;

    const minPercent = ((minVal - PRICE_MIN) / range) * 100;
    const maxPercent = ((maxVal - PRICE_MIN) / range) * 100;

    priceSliderRange.style.left = minPercent + '%';
    priceSliderRange.style.width = (maxPercent - minPercent) + '%';

    // Update labels
    if (priceLabelMin) {
      priceLabelMin.textContent = formatPrice(minVal);
    }
    if (priceLabelMax) {
      const maxDisplay = maxVal >= PRICE_MAX ? formatPrice(PRICE_MAX) + '+' : formatPrice(maxVal);
      priceLabelMax.textContent = maxDisplay;
    }

    updateHistogramHighlight();
    updatePropertyCount();
  }

  // Count properties in current price range
  function countPropertiesInRange(minPrice, maxPrice) {
    if (typeof allProperties === 'undefined') return 0;

    return allProperties.filter(prop => {
      if (!prop.price) return false;
      const aboveMin = minPrice <= 0 || prop.price >= minPrice;
      const belowMax = maxPrice >= PRICE_MAX || prop.price <= maxPrice;
      return aboveMin && belowMax;
    }).length;
  }

  // Update property count display
  function updatePropertyCount() {
    if (!priceSliderCount) return;

    const minVal = parseInt(priceSliderMin.value);
    const maxVal = parseInt(priceSliderMax.value);
    const count = countPropertiesInRange(minVal, maxVal);

    if (minVal === PRICE_MIN && maxVal >= PRICE_MAX) {
      priceSliderCount.textContent = 'Show all properties';
    } else {
      priceSliderCount.textContent = 'Show ' + count + ' ' + (count === 1 ? 'property' : 'properties');
    }
  }

  // Update button label to show active price range
  function updatePriceButtonLabel() {
    if (!priceBtnLabel || !priceFilterBtn) return;

    const minVal = parseInt(priceSliderMin.value);
    const maxVal = parseInt(priceSliderMax.value);

    if (minVal === PRICE_MIN && maxVal >= PRICE_MAX) {
      priceBtnLabel.textContent = 'Price';
      priceFilterBtn.classList.remove('active');
    } else {
      priceBtnLabel.textContent = formatPrice(minVal) + ' - ' + formatPrice(maxVal);
      priceFilterBtn.classList.add('active');
    }
  }

  // Handle slider input
  function handleSliderInput() {
    let minVal = parseInt(priceSliderMin.value);
    let maxVal = parseInt(priceSliderMax.value);

    // Prevent sliders from crossing
    if (minVal > maxVal - BUCKET_SIZE) {
      if (this === priceSliderMin) {
        priceSliderMin.value = maxVal - BUCKET_SIZE;
      } else {
        priceSliderMax.value = minVal + BUCKET_SIZE;
      }
    }

    updateSliderRange();
  }

  // Initialize sliders
  if (priceSliderMin && priceSliderMax) {
    priceSliderMin.addEventListener('input', handleSliderInput);
    priceSliderMax.addEventListener('input', handleSliderInput);

    // Initialize range visual
    updateSliderRange();
  }

  // Clear button
  if (priceSliderClear) {
    priceSliderClear.addEventListener('click', function(e) {
      e.stopPropagation();
      priceSliderMin.value = PRICE_MIN;
      priceSliderMax.value = PRICE_MAX;
      updateSliderRange();
      updatePriceButtonLabel();
      applyFilters();
    });
  }

  // Apply button
  if (priceSliderApply) {
    priceSliderApply.addEventListener('click', function(e) {
      e.stopPropagation();
      updatePriceButtonLabel();
      applyFilters();

      // Close dropdown and mobile backdrop
      document.getElementById('dropdown-price').classList.remove('show');
      if (typeof closeAllDropdowns === 'function') closeAllDropdowns();
    });
  }

  // Render histogram when properties are available
  function initHistogram() {
    if (typeof allProperties !== 'undefined') {
      renderHistogram();
    } else {
      // Wait for properties to load
      setTimeout(initHistogram, 100);
    }
  }
  initHistogram();

  // Mobile backdrop element for dropdowns
  let mobileBackdrop = null;
  function getMobileBackdrop() {
    if (!mobileBackdrop) {
      mobileBackdrop = document.createElement('div');
      mobileBackdrop.className = 'filter-mobile-backdrop';
      mobileBackdrop.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;';
      document.body.appendChild(mobileBackdrop);
      mobileBackdrop.addEventListener('click', closeAllDropdowns);
    }
    return mobileBackdrop;
  }

  function closeAllDropdowns() {
    document.querySelectorAll('.filter-dropdown-menu').forEach(m => {
      m.classList.remove('show');
    });
    const backdrop = getMobileBackdrop();
    backdrop.style.display = 'none';
    document.body.style.overflow = '';
  }

  function isMobile() {
    return window.innerWidth <= 768;
  }

  // Dropdown toggle functionality
  const dropdownBtns = document.querySelectorAll('[data-dropdown]');

  dropdownBtns.forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      const dropdownId = this.getAttribute('data-dropdown');
      const menu = document.getElementById('dropdown-' + dropdownId);
      const wasOpen = menu.classList.contains('show');

      // Close all other dropdowns
      document.querySelectorAll('.filter-dropdown-menu').forEach(m => {
        if (m !== menu) m.classList.remove('show');
      });

      // Toggle this dropdown
      menu.classList.toggle('show');

      // Handle mobile backdrop
      if (isMobile()) {
        const backdrop = getMobileBackdrop();
        if (!wasOpen && menu.classList.contains('show')) {
          backdrop.style.display = 'block';
          document.body.style.overflow = 'hidden';
        } else {
          backdrop.style.display = 'none';
          document.body.style.overflow = '';
        }
      }
    });
  });

  // Close dropdowns when clicking outside
  document.addEventListener('click', function() {
    closeAllDropdowns();
  });

  // Prevent closing when clicking inside dropdown
  document.querySelectorAll('.filter-dropdown-menu').forEach(menu => {
    menu.addEventListener('click', function(e) {
      e.stopPropagation();
    });
  });

  // Handle filter changes for radio buttons
  document.querySelectorAll('[data-filter]').forEach(input => {
    // Skip price sliders and highlight checkboxes - they have their own handling
    if (input.id === 'price-slider-min' || input.id === 'price-slider-max') return;
    if (input.getAttribute('data-filter') === 'highlight') return;

    input.addEventListener('change', function() {
      applyFilters();

      // Update button label if selection changed
      const dropdown = this.closest('.filter-dropdown');
      if (dropdown) {
        const btn = dropdown.querySelector('.filter-btn-label');
        if (this.type === 'radio' && this.checked && this.value) {
          btn.textContent = this.closest('label').textContent.trim();
          dropdown.querySelector('.filter-btn').classList.add('active');
        } else if (this.type === 'radio' && this.checked && !this.value) {
          // Reset to default
          const defaultLabels = {
            'location': SITE_CONFIG.location.countryLabel,
            'bedrooms': 'Beds',
            'bathrooms': 'Baths',
            'type': 'Property types'
          };
          const filterType = this.getAttribute('data-filter');
          if (defaultLabels[filterType]) {
            btn.textContent = defaultLabels[filterType];
          }
          dropdown.querySelector('.filter-btn').classList.remove('active');
        }
      }
    });
  });

  // ==================== MORE FILTERS ====================
  const moreFilterBtn = document.getElementById('more-filter-btn');
  const moreBtnLabel = document.getElementById('more-btn-label');
  const moreFilterClear = document.getElementById('more-filter-clear');
  const moreFilterApply = document.getElementById('more-filter-apply');
  const highlightCheckboxes = document.querySelectorAll('[data-filter="highlight"]');

  // Update "More filters" button label
  function updateMoreFiltersLabel() {
    const checkedCount = document.querySelectorAll('[data-filter="highlight"]:checked').length;
    if (checkedCount > 0) {
      moreBtnLabel.textContent = `${checkedCount} filter${checkedCount > 1 ? 's' : ''}`;
      moreFilterBtn.classList.add('active');
    } else {
      moreBtnLabel.textContent = 'More filters';
      moreFilterBtn.classList.remove('active');
    }
  }

  // Clear all highlight filters
  if (moreFilterClear) {
    moreFilterClear.addEventListener('click', function(e) {
      e.stopPropagation();
      highlightCheckboxes.forEach(cb => cb.checked = false);
      updateMoreFiltersLabel();
      applyFilters();
    });
  }

  // Apply highlight filters
  if (moreFilterApply) {
    moreFilterApply.addEventListener('click', function(e) {
      e.stopPropagation();
      updateMoreFiltersLabel();
      applyFilters();
      // Close dropdown and mobile backdrop
      document.getElementById('dropdown-more').classList.remove('show');
      if (typeof closeAllDropdowns === 'function') closeAllDropdowns();
    });
  }

  // Update label when checkboxes change (for real-time feedback)
  highlightCheckboxes.forEach(cb => {
    cb.addEventListener('change', updateMoreFiltersLabel);
  });

  // ==================== FILTER COUNTS ====================
  // Get currently filtered properties based on active filters (excluding a specific filter type)
  function getFilteredPropertiesForCounts(excludeFilterType) {
    if (typeof allProperties === 'undefined') return [];

    let properties = allProperties;

    // Apply location filter (unless excluded)
    if (excludeFilterType !== 'location' && selectedLocations && selectedLocations.length > 0) {
      properties = properties.filter(p => selectedLocations.includes(p.location));
    }

    // Apply price filter (unless excluded)
    if (excludeFilterType !== 'price') {
      const minPrice = parseInt(priceSliderMin?.value || 0);
      const maxPrice = parseInt(priceSliderMax?.value || PRICE_MAX);
      if (minPrice > 0 || maxPrice < PRICE_MAX) {
        properties = properties.filter(p => {
          if (!p.price) return false;
          return p.price >= minPrice && (maxPrice >= PRICE_MAX || p.price <= maxPrice);
        });
      }
    }

    // Apply bedroom filter (unless excluded)
    if (excludeFilterType !== 'bedrooms') {
      const bedroomChecked = document.querySelector('input[name="bedrooms"]:checked');
      if (bedroomChecked && bedroomChecked.value) {
        const minBeds = parseInt(bedroomChecked.value);
        properties = properties.filter(p => p.bedrooms >= minBeds);
      }
    }

    // Apply bathroom filter (unless excluded)
    if (excludeFilterType !== 'bathrooms') {
      const bathroomChecked = document.querySelector('input[name="bathrooms"]:checked');
      if (bathroomChecked && bathroomChecked.value) {
        const minBaths = parseInt(bathroomChecked.value);
        properties = properties.filter(p => p.bathrooms >= minBaths);
      }
    }

    // Apply property type filter (unless excluded)
    if (excludeFilterType !== 'type') {
      const typeChecked = document.querySelector('input[name="propertyType"]:checked');
      if (typeChecked && typeChecked.value) {
        properties = properties.filter(p => p.propertyType === typeChecked.value);
      }
    }

    // Apply highlight filters (unless excluded)
    if (excludeFilterType !== 'highlight') {
      const highlightChecked = document.querySelectorAll('[data-filter="highlight"]:checked');
      highlightChecked.forEach(cb => {
        const highlightValue = cb.value;
        properties = properties.filter(p => p.highlights && p.highlights.includes(highlightValue));
      });
    }

    return properties;
  }

  function updateFilterCounts() {
    if (typeof allProperties === 'undefined') {
      // Retry until properties are loaded
      setTimeout(updateFilterCounts, 100);
      return;
    }

    // Get filtered properties excluding the filter we're calculating counts for
    // This gives cascading counts based on OTHER active filters

    // Bedroom counts - filter by everything EXCEPT bedrooms
    const bedsFiltered = getFilteredPropertiesForCounts('bedrooms');
    const bedsAnyEl = document.querySelector('[data-count="beds-any"]');
    if (bedsAnyEl) bedsAnyEl.textContent = `(${bedsFiltered.length})`;
    for (let i = 1; i <= 5; i++) {
      const count = bedsFiltered.filter(p => p.bedrooms >= i).length;
      const el = document.querySelector(`[data-count="beds-${i}"]`);
      if (el) el.textContent = count > 0 ? `(${count})` : '';
    }

    // Bathroom counts - filter by everything EXCEPT bathrooms
    const bathsFiltered = getFilteredPropertiesForCounts('bathrooms');
    const bathsAnyEl = document.querySelector('[data-count="baths-any"]');
    if (bathsAnyEl) bathsAnyEl.textContent = `(${bathsFiltered.length})`;
    for (let i = 1; i <= 3; i++) {
      const count = bathsFiltered.filter(p => p.bathrooms >= i).length;
      const el = document.querySelector(`[data-count="baths-${i}"]`);
      if (el) el.textContent = count > 0 ? `(${count})` : '';
    }

    // Property type counts - filter by everything EXCEPT type
    const typeFiltered = getFilteredPropertiesForCounts('type');
    const typeAnyEl = document.querySelector('[data-count="type-any"]');
    if (typeAnyEl) typeAnyEl.textContent = `(${typeFiltered.length})`;
    const types = ['House', 'FlatApartment', 'Townhouse', 'Land'];
    types.forEach(type => {
      const count = typeFiltered.filter(p => p.propertyType === type).length;
      const el = document.querySelector(`[data-count="type-${type}"]`);
      if (el) el.textContent = count > 0 ? `(${count})` : '';
    });
  }

  // Initialize counts
  updateFilterCounts();

  // Make updateFilterCounts available globally for filtering.js
  window.updateFilterCounts = updateFilterCounts;

  // ==================== CLEAR ALL FILTERS ====================
  const clearAllBtn = document.getElementById('clear-all-filters-btn');

  // Check if any filters are active and show/hide the clear all button
  function updateClearAllButton() {
    let hasActiveFilters = false;

    // Check location filter
    if (selectedLocations && selectedLocations.length > 0) hasActiveFilters = true;

    // Check price filter
    const minPrice = parseInt(priceSliderMin?.value || 0);
    const maxPrice = parseInt(priceSliderMax?.value || PRICE_MAX);
    if (minPrice > 0 || maxPrice < PRICE_MAX) hasActiveFilters = true;

    // Check bedroom filter
    const bedroomChecked = document.querySelector('input[name="bedrooms"]:checked');
    if (bedroomChecked && bedroomChecked.value) hasActiveFilters = true;

    // Check bathroom filter
    const bathroomChecked = document.querySelector('input[name="bathrooms"]:checked');
    if (bathroomChecked && bathroomChecked.value) hasActiveFilters = true;

    // Check property type filter
    const typeChecked = document.querySelector('input[name="propertyType"]:checked');
    if (typeChecked && typeChecked.value) hasActiveFilters = true;

    // Check highlight/more filters
    const highlightChecked = document.querySelectorAll('[data-filter="highlight"]:checked');
    if (highlightChecked.length > 0) hasActiveFilters = true;

    // Toggle highlight on clear all button
    if (clearAllBtn) {
      if (hasActiveFilters) {
        clearAllBtn.classList.add('has-filters');
      } else {
        clearAllBtn.classList.remove('has-filters');
      }
    }
  }

  // Expose function for filtering.js to sync selected locations
  window.setSelectedLocations = function(locations) {
    selectedLocations = locations || [];
    updateClearAllButton();
  };

  // Clear all filters function
  function clearAllFilters() {
    // Clear location
    selectedLocations = [];
    if (locationFilterValue) locationFilterValue.value = '';
    if (locationBtnLabel) locationBtnLabel.textContent = SITE_CONFIG.location.countryLabel;
    if (locationBtn) locationBtn.classList.remove('active');

    // Clear price
    if (priceSliderMin) priceSliderMin.value = PRICE_MIN;
    if (priceSliderMax) priceSliderMax.value = PRICE_MAX;
    updateSliderRange();
    updatePriceButtonLabel();

    // Clear bedrooms
    const bedroomAny = document.querySelector('input[name="bedrooms"][value=""]');
    if (bedroomAny) bedroomAny.checked = true;
    const bedsDropdown = document.querySelector('[data-dropdown="beds"]');
    if (bedsDropdown) {
      bedsDropdown.querySelector('.filter-btn-label').textContent = 'Beds';
      bedsDropdown.classList.remove('active');
    }

    // Clear bathrooms
    const bathroomAny = document.querySelector('input[name="bathrooms"][value=""]');
    if (bathroomAny) bathroomAny.checked = true;
    const bathsDropdown = document.querySelector('[data-dropdown="baths"]');
    if (bathsDropdown) {
      bathsDropdown.querySelector('.filter-btn-label').textContent = 'Baths';
      bathsDropdown.classList.remove('active');
    }

    // Clear property type
    const typeAny = document.querySelector('input[name="propertyType"][value=""]');
    if (typeAny) typeAny.checked = true;
    const typeDropdown = document.querySelector('[data-dropdown="type"]');
    if (typeDropdown) {
      typeDropdown.querySelector('.filter-btn-label').textContent = 'Property types';
      typeDropdown.classList.remove('active');
    }

    // Clear highlight/more filters
    highlightCheckboxes.forEach(cb => cb.checked = false);
    updateMoreFiltersLabel();

    // Update URL
    window.history.replaceState({}, '', window.location.pathname);

    // Clear localStorage filter state
    try {
      localStorage.removeItem('ppiproperties-filter-state');
    } catch (e) {
      console.warn('Could not clear localStorage:', e);
    }

    // Apply filters and update button visibility
    applyFilters();
    updateClearAllButton();
  }

  // Event listener for clear all button
  if (clearAllBtn) {
    clearAllBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      clearAllFilters();
    });
  }

  // Update clear all button visibility and filter counts when filters change
  // Hook into existing filter change events
  const originalApplyFilters = window.applyFilters;
  window.applyFilters = function() {
    if (originalApplyFilters) originalApplyFilters();
    updateClearAllButton();
    updateFilterCounts();
  };

  // Initial check
  setTimeout(updateClearAllButton, 200);
});

function applyFilters() {
  // This integrates with the existing filtering.js
  if (typeof window.filterProperties === 'function') {
    window.filterProperties();
  }
}
</script>
