<!-- OneRoof-style Filter Bar - Horizontal dropdown buttons -->
<div class="filter-bar-oneroof">
  <div class="filter-bar-row">
    <!-- Location Dropdown -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn" data-dropdown="location">
        <span class="filter-btn-label">All South Africa</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="filter-dropdown-menu" id="dropdown-location">
        <div class="filter-dropdown-header">Location</div>
        <label class="filter-option">
          <input type="radio" name="location" value="" checked data-filter="location"> All Locations
        </label>
        {%- for location in ['Florida Park', 'Glenhazel', 'Moregloed', 'Ninapark'] %}
        <label class="filter-option">
          <input type="radio" name="location" value="{{ location }}" data-filter="location"> {{ location }}
        </label>
        {%- endfor %}
      </div>
    </div>

    <!-- Price Dropdown -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn" data-dropdown="price">
        <span class="filter-btn-label">Price</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="filter-dropdown-menu filter-dropdown-wide" id="dropdown-price">
        <div class="filter-dropdown-header">Price Range</div>
        <div class="filter-price-inputs">
          <div class="filter-price-group">
            <label>Min Price</label>
            <select id="filter-price-min" data-filter="price-min">
              <option value="0">Any</option>
              <option value="500000">R500,000</option>
              <option value="1000000">R1,000,000</option>
              <option value="1500000">R1,500,000</option>
              <option value="2000000">R2,000,000</option>
              <option value="3000000">R3,000,000</option>
              <option value="5000000">R5,000,000</option>
            </select>
          </div>
          <div class="filter-price-divider">to</div>
          <div class="filter-price-group">
            <label>Max Price</label>
            <select id="filter-price-max" data-filter="price-max">
              <option value="10000000">Any</option>
              <option value="1000000">R1,000,000</option>
              <option value="1500000">R1,500,000</option>
              <option value="2000000">R2,000,000</option>
              <option value="3000000">R3,000,000</option>
              <option value="5000000">R5,000,000</option>
              <option value="10000000">R10,000,000+</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Beds Dropdown -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn" data-dropdown="beds">
        <span class="filter-btn-label">Beds</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="filter-dropdown-menu" id="dropdown-beds">
        <div class="filter-dropdown-header">Bedrooms</div>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="" checked data-filter="bedrooms"> Any
        </label>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="1" data-filter="bedrooms"> 1+
        </label>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="2" data-filter="bedrooms"> 2+
        </label>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="3" data-filter="bedrooms"> 3+
        </label>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="4" data-filter="bedrooms"> 4+
        </label>
        <label class="filter-option">
          <input type="radio" name="bedrooms" value="5" data-filter="bedrooms"> 5+
        </label>
      </div>
    </div>

    <!-- Baths Dropdown -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn" data-dropdown="baths">
        <span class="filter-btn-label">Baths</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="filter-dropdown-menu" id="dropdown-baths">
        <div class="filter-dropdown-header">Bathrooms</div>
        <label class="filter-option">
          <input type="radio" name="bathrooms" value="" checked data-filter="bathrooms"> Any
        </label>
        <label class="filter-option">
          <input type="radio" name="bathrooms" value="1" data-filter="bathrooms"> 1+
        </label>
        <label class="filter-option">
          <input type="radio" name="bathrooms" value="2" data-filter="bathrooms"> 2+
        </label>
        <label class="filter-option">
          <input type="radio" name="bathrooms" value="3" data-filter="bathrooms"> 3+
        </label>
      </div>
    </div>

    <!-- Property Type Dropdown -->
    <div class="filter-dropdown">
      <button type="button" class="filter-btn" data-dropdown="type">
        <span class="filter-btn-label">Property types</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="filter-dropdown-menu" id="dropdown-type">
        <div class="filter-dropdown-header">Property Type</div>
        <label class="filter-option">
          <input type="radio" name="propertyType" value="" checked data-filter="type"> All Types
        </label>
        <label class="filter-option">
          <input type="radio" name="propertyType" value="House" data-filter="type"> House
        </label>
        <label class="filter-option">
          <input type="radio" name="propertyType" value="FlatApartment" data-filter="type"> Flat/Apartment
        </label>
        <label class="filter-option">
          <input type="radio" name="propertyType" value="Townhouse" data-filter="type"> Townhouse
        </label>
        <label class="filter-option">
          <input type="radio" name="propertyType" value="Land" data-filter="type"> Land
        </label>
      </div>
    </div>

    <!-- More Filters Button -->
    <button type="button" class="filter-btn filter-btn-more">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="4" y1="21" x2="4" y2="14"></line>
        <line x1="4" y1="10" x2="4" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12" y2="3"></line>
        <line x1="20" y1="21" x2="20" y2="16"></line>
        <line x1="20" y1="12" x2="20" y2="3"></line>
        <line x1="1" y1="14" x2="7" y2="14"></line>
        <line x1="9" y1="8" x2="15" y2="8"></line>
        <line x1="17" y1="16" x2="23" y2="16"></line>
      </svg>
      More filters
    </button>
  </div>
</div>

<style>
/* OneRoof Filter Bar Styles */
.filter-bar-oneroof {
  background: #f9fafb;
  border-bottom: 1px solid #e5e7eb;
  padding: 12px 0;
  margin-bottom: 0;
}

.filter-bar-row {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 1rem;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.filter-dropdown {
  position: relative;
}

.filter-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  color: #374151;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.filter-btn:hover {
  border-color: #9ca3af;
  background: #fafafa;
}

.filter-btn.active {
  border-color: #f97316;
  background: #fff7ed;
  color: #ea580c;
}

.filter-btn-more {
  margin-left: auto;
  background: transparent;
  border: none;
  color: #6b7280;
}

.filter-btn-more:hover {
  color: #374151;
  background: transparent;
}

.filter-dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.12);
  min-width: 180px;
  z-index: 50;
  padding: 8px 0;
}

.filter-dropdown-menu.show {
  display: block;
}

.filter-dropdown-wide {
  min-width: 320px;
  padding: 16px;
}

.filter-dropdown-header {
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 600;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid #f3f4f6;
  margin-bottom: 4px;
}

.filter-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 14px;
  color: #374151;
}

.filter-option:hover {
  background: #f9fafb;
}

.filter-option input[type="radio"] {
  width: 16px;
  height: 16px;
  accent-color: #f97316;
}

.filter-price-inputs {
  display: flex;
  align-items: flex-end;
  gap: 12px;
}

.filter-price-group {
  flex: 1;
}

.filter-price-group label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #6b7280;
  margin-bottom: 6px;
}

.filter-price-group select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  font-size: 14px;
  color: #374151;
  background: white;
  cursor: pointer;
}

.filter-price-group select:focus {
  outline: none;
  border-color: #f97316;
}

.filter-price-divider {
  padding-bottom: 10px;
  color: #9ca3af;
  font-size: 14px;
}

/* Mobile responsive */
@media (max-width: 768px) {
  .filter-bar-row {
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .filter-bar-row::-webkit-scrollbar {
    display: none;
  }

  .filter-btn-more {
    margin-left: 0;
  }
}
</style>

<script>
// Filter dropdown functionality
document.addEventListener('DOMContentLoaded', function() {
  const dropdownBtns = document.querySelectorAll('[data-dropdown]');

  dropdownBtns.forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      const dropdownId = this.getAttribute('data-dropdown');
      const menu = document.getElementById('dropdown-' + dropdownId);

      // Close all other dropdowns
      document.querySelectorAll('.filter-dropdown-menu').forEach(m => {
        if (m !== menu) m.classList.remove('show');
      });

      // Toggle this dropdown
      menu.classList.toggle('show');
    });
  });

  // Close dropdowns when clicking outside
  document.addEventListener('click', function() {
    document.querySelectorAll('.filter-dropdown-menu').forEach(m => {
      m.classList.remove('show');
    });
  });

  // Prevent closing when clicking inside dropdown
  document.querySelectorAll('.filter-dropdown-menu').forEach(menu => {
    menu.addEventListener('click', function(e) {
      e.stopPropagation();
    });
  });

  // Handle filter changes
  document.querySelectorAll('[data-filter]').forEach(input => {
    input.addEventListener('change', function() {
      applyFilters();

      // Update button label if selection changed
      const dropdown = this.closest('.filter-dropdown');
      if (dropdown) {
        const btn = dropdown.querySelector('.filter-btn-label');
        if (this.type === 'radio' && this.checked && this.value) {
          btn.textContent = this.closest('label').textContent.trim();
          dropdown.querySelector('.filter-btn').classList.add('active');
        } else if (this.type === 'radio' && this.checked && !this.value) {
          // Reset to default
          const defaultLabels = {
            'location': 'All South Africa',
            'bedrooms': 'Beds',
            'bathrooms': 'Baths',
            'type': 'Property types'
          };
          const filterType = this.getAttribute('data-filter');
          if (defaultLabels[filterType]) {
            btn.textContent = defaultLabels[filterType];
          }
          dropdown.querySelector('.filter-btn').classList.remove('active');
        }
      }
    });
  });
});

function applyFilters() {
  // This integrates with the existing filtering.js
  if (typeof window.filterProperties === 'function') {
    window.filterProperties();
  }
}
</script>
