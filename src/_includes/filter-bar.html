<form role="search" aria-label="Filter properties" class="my-8 p-6 bg-white rounded-lg shadow-sm">
  <fieldset class="border-0 p-0 m-0">
    <legend class="sr-only">Property Search Filters</legend>
    <div class="flex flex-wrap gap-4 items-end">

      <!-- Property Type Filter -->
      <div class="flex-1 min-w-[200px]">
        <label for="filter-type" class="block text-sm font-medium text-gray-700 mb-1">
          Property Type
        </label>
        <select
          id="filter-type"
          name="propertyType"
          data-filter="type"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[48px]">
          <option value="">All Types</option>
          <option value="House">House</option>
          <option value="FlatApartment">Flat/Apartment</option>
          <option value="Sectional Title Unit">Sectional Title Unit</option>
          <option value="Land">Land</option>
        </select>
      </div>

      <!-- Price Range - Min -->
      <div class="flex-1 min-w-[150px]">
        <label for="filter-price-min" class="block text-sm font-medium text-gray-700 mb-1">
          Min Price
        </label>
        <input
          type="number"
          id="filter-price-min"
          name="priceMin"
          data-filter="price-min"
          placeholder="e.g., 400000"
          step="1000"
          min="0"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[48px]">
      </div>

      <!-- Price Range - Max -->
      <div class="flex-1 min-w-[150px]">
        <label for="filter-price-max" class="block text-sm font-medium text-gray-700 mb-1">
          Max Price
        </label>
        <input
          type="number"
          id="filter-price-max"
          name="priceMax"
          data-filter="price-max"
          placeholder="e.g., 8000000"
          step="1000"
          min="0"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[48px]">
      </div>

      <!-- Bedrooms Filter -->
      <div class="flex-1 min-w-[150px]">
        <label for="filter-bedrooms" class="block text-sm font-medium text-gray-700 mb-1">
          Bedrooms
        </label>
        <select
          id="filter-bedrooms"
          name="bedrooms"
          data-filter="bedrooms"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[48px]">
          <option value="">Any</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4+</option>
          <option value="5">5+</option>
        </select>
      </div>

      <!-- Location Filter -->
      <div class="flex-1 min-w-[200px]">
        <label for="filter-location" class="block text-sm font-medium text-gray-700 mb-1">
          Location
        </label>
        <select
          id="filter-location"
          name="location"
          data-filter="location"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[48px]">
          <option value="">All Locations</option>
          <option value="Florida Park">Florida Park</option>
          <option value="Glenhazel">Glenhazel</option>
          <option value="Moregloed">Moregloed</option>
          <option value="Ninapark">Ninapark</option>
        </select>
      </div>

      <!-- Clear All Filters Button -->
      <div class="flex-shrink-0">
        <button
          type="button"
          data-filter-action="clear"
          class="px-6 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[48px]">
          Clear All Filters
        </button>
      </div>

    </div>
  </fieldset>
</form>
