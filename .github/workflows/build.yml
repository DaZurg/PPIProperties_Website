name: Build Site

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0,6,12,18 * * *"  # 4 times a day
  workflow_dispatch:

jobs:
  build-site:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
        env:
          GOOGLE_SHEETS_CONFIG: ${{ secrets.GOOGLE_SHEETS_CONFIG }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: _site/
          retention-days: 7

      - name: Build status report
        if: success()
        run: |
          echo "✅ Build completed successfully"
          echo "Build time: $(date)"
          echo "Artifact: build-output"
          echo "Size: $(du -sh _site/ | cut -f1)"

      - name: Build failure report
        if: failure()
        run: |
          echo "❌ Build failed"
          echo "Check logs above for error details"
          exit 1

      - name: Download build artifact
        if: success()
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .

      - name: Install FTP client
        if: success()
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to cPanel via FTP
        if: success()
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "⚠️  Skipping deployment: GitHub Secrets not configured"
            echo "Configure FTP_HOST, FTP_USERNAME, FTP_PASSWORD in repository Settings → Secrets"
            exit 0
          fi
          echo "🚀 Starting FTP deployment to $FTP_HOST"

          # Create lftp script to avoid shell parsing issues with credentials
          cat > /tmp/lftp-deploy.sh << LFTP_SCRIPT
          set ssl:verify-certificate no
          set net:timeout 60
          set net:connection-limit 2
          open $FTP_HOST
          login $FTP_USERNAME $FTP_PASSWORD
          cd /public_html/temp.ppiproperties.co.za
          mirror -R ./_site .
          quit
          LFTP_SCRIPT

          # Execute lftp with the script
          lftp < /tmp/lftp-deploy.sh || {
            echo "❌ Deployment failed"
            exit 1
          }
          echo "✅ Deployment completed successfully"

      - name: Deployment status report
        if: success()
        run: |
          echo "=========================================="
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo ""
          echo "Build Status: ✅ Success"
          echo "Deployment Status: ✅ Success"
          echo "Timestamp: $(date)"
          echo ""
          echo "All files deployed to temp.ppiproperties.co.za"
          echo "Visit https://temp.ppiproperties.co.za to verify the changes."
          echo "=========================================="

      - name: Deployment failure report
        if: failure()
        run: |
          echo "=========================================="
          echo "❌ DEPLOYMENT FAILED"
          echo "=========================================="
          echo ""
          echo "Build Status: Check logs above"
          echo "Deployment Status: ❌ Failed"
          echo "Timestamp: $(date)"
          echo ""
          echo "Review the logs above for details."
          echo "Check GitHub Secrets configuration if FTP error occurred."
          echo "=========================================="
          exit 1
