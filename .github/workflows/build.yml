name: Build Site

on:
  push:
    branches:
      - main
  schedule:
      - cron: "30 0,6,12,18 * * *"  # 4 times a day
  workflow_dispatch:

jobs:
  build-site:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build
        env:
          GOOGLE_SHEETS_CONFIG: ${{ secrets.GOOGLE_SHEETS_CONFIG }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: _site/
          retention-days: 7

      - name: Build status report
        if: success()
        run: |
          echo "✅ Build completed successfully"
          echo "Build time: $(date)"
          echo "Artifact: build-output"
          echo "Size: $(du -sh _site/ | cut -f1)"

      - name: Build failure report
        if: failure()
        run: |
          echo "❌ Build failed"
          echo "Check logs above for error details"
          exit 1

      - name: Download build artifact
        if: success()
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./_site

      - name: Install FTP client
        if: success()
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to cPanel via FTP
        if: success()
        timeout-minutes: 45
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "⚠️  Skipping deployment: GitHub Secrets not configured"
            echo "Configure FTP_HOST, FTP_USERNAME, FTP_PASSWORD in repository Settings → Secrets"
            exit 0
          fi
          echo "🚀 Starting FTP deployment to $FTP_HOST"

          # Verify _site directory exists
          if [ ! -d "./_site" ]; then
            echo "❌ Error: _site directory not found"
            ls -la
            exit 1
          fi
          echo "📁 Contents of _site:"
          ls -la ./_site | head -20

          # Create lftp script to avoid shell parsing issues with credentials
          cat > /tmp/lftp-deploy.sh << LFTP_SCRIPT
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set net:reconnect-interval-multiplier 1
          set net:connection-limit 8
          set ftp:ssl-allow yes
          set cmd:fail-exit yes
          set mirror:parallel-transfer-count 4
          open $FTP_HOST
          login $FTP_USERNAME $FTP_PASSWORD
          pwd
          ls
          # Deploy directly to FTP root (which is the document root)
          # --ignore-time: compare by size only (skip files with same size)
          # --no-perms: don't try to sync permissions (faster)
          # --parallel=4: upload 4 files simultaneously
          # This means images with unchanged content (same size) will be skipped
          mirror -R --verbose --ignore-time --no-perms --parallel=4 ./_site .
          quit
          LFTP_SCRIPT

          # Execute lftp with timeout (40 minutes)
          timeout 2400 lftp < /tmp/lftp-deploy.sh || {
            echo "❌ Deployment failed or timed out"
            exit 1
          }
          echo "✅ Deployment completed successfully"

      - name: Deployment status report
        if: success()
        run: |
          echo "=========================================="
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo ""
          echo "Build Status: ✅ Success"
          echo "Deployment Status: ✅ Success"
          echo "Timestamp: $(date)"
          echo ""
          echo "All files deployed to FTP root"
          echo "Visit https://temp.ppiproperties.co.za to verify the changes."
          echo "=========================================="

      - name: Deployment failure report
        if: failure()
        run: |
          echo "=========================================="
          echo "❌ DEPLOYMENT FAILED"
          echo "=========================================="
          echo ""
          echo "Build Status: Check logs above"
          echo "Deployment Status: ❌ Failed"
          echo "Timestamp: $(date)"
          echo ""
          echo "Review the logs above for details."
          echo "Check GitHub Secrets configuration if FTP error occurred."
          echo "=========================================="
          exit 1
