name: Build Site

on:
  push:
    branches:
      - main
  schedule:
      - cron: "5/30 * * * *"
  workflow_dispatch:

jobs:
  build-site:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install FTP client (for image cache check)
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Fetch existing FTP images list
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "⚠️  FTP not configured, will process all images"
            echo "[]" > .ftp-images-cache.json
            exit 0
          fi

          echo "📋 Fetching existing images list from FTP..."

          # Create lftp script to list images directory
          cat > /tmp/lftp-list.sh << 'LFTP_SCRIPT'
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 3
          set ftp:ssl-allow yes
          set ftp:passive-mode yes
          LFTP_SCRIPT

          # Add credentials and commands (separate to avoid variable expansion issues)
          echo "open $FTP_HOST" >> /tmp/lftp-list.sh
          echo "login $FTP_USERNAME $FTP_PASSWORD" >> /tmp/lftp-list.sh
          echo "cd images" >> /tmp/lftp-list.sh
          echo "cls -1" >> /tmp/lftp-list.sh
          echo "quit" >> /tmp/lftp-list.sh

          # Execute and capture output
          if timeout 120 lftp < /tmp/lftp-list.sh > .ftp-images-raw.txt 2>/dev/null; then
            # Convert to JSON array
            echo "[" > .ftp-images-cache.json
            first=true
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                if [ "$first" = true ]; then
                  first=false
                else
                  echo "," >> .ftp-images-cache.json
                fi
                echo "  \"$line\"" >> .ftp-images-cache.json
              fi
            done < .ftp-images-raw.txt
            echo "]" >> .ftp-images-cache.json

            IMAGE_COUNT=$(grep -c '"property-' .ftp-images-cache.json 2>/dev/null || echo "0")
            echo "✅ Found $IMAGE_COUNT existing images on FTP"
          else
            echo "⚠️  Could not fetch FTP images list, will process all images"
            echo "[]" > .ftp-images-cache.json
          fi

          rm -f .ftp-images-raw.txt /tmp/lftp-list.sh

      - name: Run build
        run: npm run build
        env:
          GOOGLE_SHEETS_CONFIG: ${{ secrets.GOOGLE_SHEETS_CONFIG }}
          FTP_IMAGES_CACHE: .ftp-images-cache.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: _site/
          retention-days: 7

      - name: Build status report
        if: success()
        run: |
          echo "✅ Build completed successfully"
          echo "Build time: $(date)"
          echo "Artifact: build-output"
          echo "Size: $(du -sh _site/ | cut -f1)"

      - name: Build failure report
        if: failure()
        run: |
          echo "❌ Build failed"
          echo "Check logs above for error details"
          exit 1

      - name: Download build artifact
        if: success()
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./_site

      - name: Deploy to cPanel via FTP
        if: success()
        timeout-minutes: 45
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "⚠️  Skipping deployment: GitHub Secrets not configured"
            echo "Configure FTP_HOST, FTP_USERNAME, FTP_PASSWORD in repository Settings → Secrets"
            exit 0
          fi
          echo "🚀 Starting FTP deployment to $FTP_HOST"

          # Verify _site directory exists
          if [ ! -d "./_site" ]; then
            echo "❌ Error: _site directory not found"
            ls -la
            exit 1
          fi
          echo "📁 Contents of _site:"
          ls -la ./_site | head -20

          # Create lftp script to avoid shell parsing issues with credentials
          cat > /tmp/lftp-deploy.sh << LFTP_SCRIPT
          set ssl:verify-certificate no
          set net:timeout 60
          set net:max-retries 5
          set net:reconnect-interval-base 10
          set net:reconnect-interval-multiplier 2
          set net:connection-limit 4
          set ftp:ssl-allow yes
          set ftp:passive-mode yes
          set cmd:fail-exit yes
          set mirror:parallel-transfer-count 2
          open $FTP_HOST
          login $FTP_USERNAME $FTP_PASSWORD
          # Deploy directly to FTP root (which is the document root)
          # --ignore-time: compare by size only (skip files with same size)
          # --no-perms: don't try to sync permissions (faster)
          # --parallel=2: upload 2 files simultaneously (reduced for stability)
          mirror -R --verbose --ignore-time --no-perms --parallel=2 ./_site .
          quit
          LFTP_SCRIPT

          # Execute lftp with timeout (40 minutes)
          timeout 2400 lftp < /tmp/lftp-deploy.sh || {
            echo "❌ Deployment failed or timed out"
            exit 1
          }
          echo "✅ Deployment completed successfully"

      - name: Deployment status report
        if: success()
        run: |
          echo "=========================================="
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo ""
          echo "Build Status: ✅ Success"
          echo "Deployment Status: ✅ Success"
          echo "Timestamp: $(date)"
          echo ""
          echo "All files deployed to FTP root"
          echo "Visit https://temp.ppiproperties.co.za to verify the changes."
          echo "=========================================="

      - name: Deployment failure report
        if: failure()
        run: |
          echo "=========================================="
          echo "❌ DEPLOYMENT FAILED"
          echo "=========================================="
          echo ""
          echo "Build Status: Check logs above"
          echo "Deployment Status: ❌ Failed"
          echo "Timestamp: $(date)"
          echo ""
          echo "Review the logs above for details."
          echo "Check GitHub Secrets configuration if FTP error occurred."
          echo "=========================================="
          exit 1
